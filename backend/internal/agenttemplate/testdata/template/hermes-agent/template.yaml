id: hermes-agent
name: Hermes Agent
shortName: Hermes
description: Hermes Agent 服务，支持 API 接入、终端、文件、SSH 与 IDE 连接。
image: nousresearch/hermes-agent:latest
port: 8642
defaultArgs:
  - gateway
  - run
backendSupported: true
workingDir: /opt/hermes
manifestDir: manifests
user: hermes
presentation:
  logoKey: hermes-agent
  brandColor: "#2563eb"
  docsLabel: 对话 + 终端
workspaces:
  - key: overview
    label: 概览
  - key: chat
    label: 对话
  - key: files
    label: 文件
  - key: settings
    label: 设置
access:
  - key: api
    label: API
    path: /v1
    auth: apiKey
  - key: terminal
    label: 终端
  - key: files
    label: 文件
    rootPath: /opt/hermes
  - key: ssh
    label: SSH
  - key: ide
    label: IDE
    modes:
      - cursor
      - vscode
      - zed
      - gateway
actions:
  - key: open-chat
    label: 对话
  - key: open-terminal
    label: 终端
  - key: open-files
    label: 文件
  - key: open-settings
    label: 设置
  - key: run
    label: 启动
  - key: pause
    label: 暂停
  - key: delete
    label: 删除
settings:
  runtime:
    - key: cpu
      label: CPU
      type: quantity
      required: true
      binding:
        kind: runtime
        key: cpu
    - key: memory
      label: 内存
      type: quantity
      required: true
      binding:
        kind: runtime
        key: memory
    - key: storage
      label: 存储
      type: quantity
      required: true
      binding:
        kind: runtime
        key: storage
  agent:
    - key: keySource
      label: 密钥来源
      type: text
      readOnly: true
      binding:
        kind: derived
        key: keySource
modelIntegration:
  type: ai-agent-switch
  client: hermes-agent
  provider:
    id: aiproxy
    name:
      zh: AI Proxy
      en: AI Proxy
    baseURL:
      source: system.aiProxyModelBaseURL
    apiKeyEnv: ANTHROPIC_API_KEY
  slots:
    - key: main
      label:
        zh: 主模型
        en: Primary model
      required: true
      mutable: true
      defaultModels:
        us: gpt-5.4
        cn: glm-4.6
      modelTypes:
        - text
        - multimodal
regionModelPresets:
  us:
    - value: gpt-5.4
      label: GPT-5.4
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: codex_responses
      kind: llm
      category: text
      capabilities:
        - reasoning
        - code
      inputModalities:
        - text
      outputModalities:
        - text
    - value: gpt-5.4-mini
      label: GPT-5.4 Mini
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: codex_responses
      kind: llm
      category: text
      capabilities:
        - reasoning
        - code
      inputModalities:
        - text
      outputModalities:
        - text
    - value: gpt-5.4-vision
      label: GPT-5.4 Vision
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: codex_responses
      kind: llm
      category: multimodal
      capabilities:
        - reasoning
        - vision
        - multimodal
      inputModalities:
        - text
        - image
      outputModalities:
        - text
    - value: gpt-image-2
      label: GPT Image 2
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: image_generation
      kind: image_generation
      category: image
      capabilities:
        - image_generation
      inputModalities:
        - text
        - image
      outputModalities:
        - image
    - value: gpt-5-mini
      label: GPT-5 Mini
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: codex_responses
      kind: llm
      category: text
      capabilities:
        - reasoning
      inputModalities:
        - text
      outputModalities:
        - text
    - value: claude-sonnet-4.6
      label: Claude Sonnet 4.6
      helper: Anthropic
      provider: custom:aiproxy-anthropic
      apiMode: anthropic_messages
      kind: llm
      category: multimodal
      capabilities:
        - reasoning
        - vision
      inputModalities:
        - text
        - image
      outputModalities:
        - text
    - value: claude-sonnet-4.5
      label: Claude Sonnet 4.5
      helper: Anthropic
      provider: custom:aiproxy-anthropic
      apiMode: anthropic_messages
      kind: llm
      category: multimodal
      capabilities:
        - reasoning
        - vision
      inputModalities:
        - text
        - image
      outputModalities:
        - text
    - value: glm-4.6
      label: GLM-4.6
      helper: GLM
      provider: custom:aiproxy-chat
      apiMode: chat_completions
      kind: llm
      category: text
      capabilities:
        - chat
      inputModalities:
        - text
      outputModalities:
        - text
    - value: MiniMax-M2.5
      label: MiniMax M2.5
      helper: MiniMax
      provider: custom:aiproxy-chat
      apiMode: chat_completions
      kind: llm
      category: text
      capabilities:
        - chat
      inputModalities:
        - text
      outputModalities:
        - text
    - value: qwen3-coder-plus
      label: Qwen3 Coder Plus
      helper: Qwen
      provider: custom:aiproxy-chat
      apiMode: chat_completions
      kind: llm
      category: text
      capabilities:
        - code
      inputModalities:
        - text
      outputModalities:
        - text
  cn:
    - value: glm-4.6
      label: GLM-4.6
      helper: GLM
      provider: custom:aiproxy-chat
      apiMode: chat_completions
      kind: llm
      category: text
      capabilities:
        - chat
      inputModalities:
        - text
      outputModalities:
        - text
    - value: glm-4.6v
      label: GLM-4.6V
      helper: GLM
      provider: custom:aiproxy-chat
      apiMode: chat_completions
      kind: llm
      category: multimodal
      capabilities:
        - vision
        - multimodal
      inputModalities:
        - text
        - image
      outputModalities:
        - text
    - value: cogview-4
      label: CogView 4
      helper: GLM
      provider: custom:aiproxy-chat
      apiMode: image_generation
      kind: image_generation
      runtimeProvider: dashscope
      category: image
      capabilities:
        - image_generation
      inputModalities:
        - text
      outputModalities:
        - image
    - value: MiniMax-M2.5
      label: MiniMax M2.5
      helper: MiniMax
      provider: custom:aiproxy-chat
      apiMode: chat_completions
      kind: llm
      category: text
      capabilities:
        - chat
      inputModalities:
        - text
      outputModalities:
        - text
    - value: qwen3-coder-plus
      label: Qwen3 Coder Plus
      helper: Qwen
      provider: custom:aiproxy-chat
      apiMode: chat_completions
      kind: llm
      category: text
      capabilities:
        - code
      inputModalities:
        - text
      outputModalities:
